name: Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "composeApp/**"
      - "core/**"
      - "feature/**"
      - "scripts/prepare-pages-web-release.sh"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "build.gradle.kts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build static site
        run: ./gradlew :composeApp:stageWebRelease

      - name: Prepare Pages bundle
        run: bash ./scripts/prepare-pages-web-release.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/github-pages

      - id: deployment
        uses: actions/deploy-pages@v4

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build core modules
        run: ./gradlew :core:model:compileKotlinIosSimulatorArm64 :core:common:compileKotlinIosSimulatorArm64 :core:database:compileKotlinIosSimulatorArm64

      - name: Build data layer
        run: ./gradlew :core:data:compileKotlinIosSimulatorArm64 :core:domain:compileKotlinIosSimulatorArm64 :core:network:compileKotlinIosSimulatorArm64

      - name: Build UI modules
        run: ./gradlew :core:designsystem:compileKotlinIosSimulatorArm64 :core:navigation:compileKotlinIosSimulatorArm64

      - name: Build feature modules
        run: ./gradlew :feature:home:compileKotlinIosSimulatorArm64 :feature:lines:compileKotlinIosSimulatorArm64 :feature:stations:compileKotlinIosSimulatorArm64 :feature:schedule:compileKotlinIosSimulatorArm64 :feature:map:compileKotlinIosSimulatorArm64 :feature:settings:compileKotlinIosSimulatorArm64

      - name: Build app
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64

      - name: Run KMP unit tests (JVM + iOS sim + wasm/JS)
        run: ./gradlew :core:common:allTests :core:domain:allTests

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7

# Drop-in nginx locations for the schedules layer.
# Merged into ~/syrmos-proxy/nginx.conf on the Pi (inside the existing server {} block).
# Reads exclusively from $HOME/syrmos-api/out/ — generated atomically by
# syrmos_admin.generator on every DB write.

# --- lines.json: same path as today; new generator writes a superset ---
location = /api/lines {
    alias /home/peterdsp/syrmos-api/out/lines.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    expires 1h;
}

# --- schedules (full snapshot) ---
location = /api/schedules {
    alias /home/peterdsp/syrmos-api/out/schedules.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=600, must-revalidate";
    add_header Vary "Accept-Encoding, If-None-Match";
    expires 10m;
}

# --- schedules manifest: small, hot path, ETag-driven ---
location = /api/schedules/manifest {
    alias /home/peterdsp/syrmos-api/out/schedules-manifest.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=60, must-revalidate";
    add_header Vary "Accept-Encoding, If-None-Match";
    expires 1m;
}

# --- per-line schedule bundles: /api/schedules/{lineId} ---
location ~ ^/api/schedules/([A-Za-z0-9_]+)$ {
    alias /home/peterdsp/syrmos-api/out/schedules/$1.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=600, must-revalidate";
    expires 10m;
}

# --- holiday rules ---
location = /api/holidays {
    alias /home/peterdsp/syrmos-api/out/holidays.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=3600";
    expires 1h;
}

# --- 24mmm dated overrides ---
location = /api/overrides {
    alias /home/peterdsp/syrmos-api/out/overrides.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=300";
    expires 5m;
}

# --- fares + contactless payment metadata ---
location = /api/fares {
    alias /home/peterdsp/syrmos-api/out/fares.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=21600";
    expires 6h;
}

# --- icon manifest + per-line drawing settings ---
location = /api/icons {
    alias /home/peterdsp/syrmos-api/out/icons.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    expires 1h;
}
location = /api/line-display {
    alias /home/peterdsp/syrmos-api/out/line-display.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    expires 1h;
}
location = /api/stations {
    alias /home/peterdsp/syrmos-api/out/stations.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    expires 1h;
}
location = /api/operators {
    alias /home/peterdsp/syrmos-api/out/operators.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=300, must-revalidate";
    expires 5m;
}

# --- STASY status + announcements feed scraped from stasy.gr daily ---
location = /api/announcements {
    alias /home/peterdsp/syrmos-api/out/announcements.json;
    default_type "application/json; charset=utf-8";
    charset utf-8;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=900, must-revalidate";
    expires 15m;
}

# --- station offsets from STASY HTML (per-station minutes from origin) ---
location = /api/station-offsets {
    alias /home/peterdsp/syrmos-api/out/station-offsets.json;
    default_type "application/json; charset=utf-8";
    charset utf-8;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=600, must-revalidate";
    expires 10m;
}

# --- train timestamps from operator PDFs (per-train per-station HH:MM) ---
# charset=utf-8 is critical: the JSON keeps Greek station names as native
# UTF-8 codepoints (ensure_ascii=False), so a browser opening the URL needs
# the charset hint or it falls back to Latin-1 and renders Î‘Î­ÏÎ¿... mojibake.
location = /api/train-timestamps {
    alias /home/peterdsp/syrmos-api/out/train-timestamps.json;
    default_type "application/json; charset=utf-8";
    charset utf-8;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=600, must-revalidate";
    expires 10m;
}

# Human-facing viewer that reads /api/train-timestamps and renders it as a
# filterable card grid with chip filters, search, and per-train stop drilldown.
# Visit https://api-syrmos.peterdsp.dev/timetables in a browser.
location = /timetables {
    alias /home/peterdsp/syrmos-api/out/timetables.html;
    default_type text/html;
    charset utf-8;
    add_header Cache-Control "public, max-age=300, must-revalidate";
    expires 5m;
}
location = /timetables.html {
    return 301 /timetables;
}

# --- raw SVG assets, served from the bundled package on the Pi ---
location /icons/ {
    alias /home/peterdsp/syrmos-api/assets/icons/;
    types {
        image/svg+xml svg;
    }
    default_type image/svg+xml;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=2592000, immutable";
    expires 30d;
    try_files $uri =404;
}

# --- OSM-derived per-line route geometry as GeoJSON ---
location /line-geometry/ {
    alias /home/peterdsp/syrmos-api/assets/line-geometry/;
    default_type application/geo+json;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "public, max-age=86400";
    expires 1d;
    try_files $uri =404;
}

# --- admin UI (FastAPI behind 127.0.0.1:8091, Cloudflare Access auth) ---
location /admin/ {
    proxy_pass http://127.0.0.1:8092/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    add_header Cache-Control "no-store" always;
}

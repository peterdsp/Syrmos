<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Primary -->
    <title>Syrmos — Athens Metro, Tram & Suburban Departures</title>
    <meta name="description" content="Syrmos is a free, offline-first companion for the Athens public transit network. Live departure countdowns, GPS nearest station, live train map, and bilingual EN/EL interface for Metro Lines 1, 2, 3, Tram T6/T7, and Suburban Railway A1–A4.">
    <meta name="keywords" content="Syrmos, Athens metro, ΣΥΡΜΟΣ, Αθήνα μετρό, τραμ, προαστιακός, OASA, STASY, Hellenic Train, live train, departures">
    <meta name="author" content="Petros Dhespollari">
    <link rel="canonical" href="https://syrmos.peterdsp.dev/">
    <meta name="theme-color" content="#0072CE">

    <!-- Icons + PWA -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="application-name" content="Syrmos">
    <meta name="apple-mobile-web-app-title" content="Syrmos">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Smart app banners (Safari / Chrome on Android) -->
    <meta name="apple-itunes-app" content="app-id=6777650671">
    <meta name="google-play-app" content="app-id=com.syrmos.android">

    <!-- Deep links to the native apps for search engines that follow rel="alternate" -->
    <link rel="alternate" href="ios-app://6777650671/syrmos/syrmos.peterdsp.dev">
    <link rel="alternate" href="android-app://com.syrmos.android/https/syrmos.peterdsp.dev">

    <!-- Open Graph (LinkedIn, Facebook, Slack, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Syrmos">
    <meta property="og:title" content="Syrmos — Athens Metro, Tram & Suburban Departures">
    <meta property="og:description" content="Live departures, GPS nearest station, live train map. iOS, Android, and Web.">
    <meta property="og:url" content="https://syrmos.peterdsp.dev/">
    <meta property="og:image" content="https://syrmos.peterdsp.dev/favicon.png">
    <meta property="og:locale" content="en_GB">
    <meta property="og:locale:alternate" content="el_GR">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Syrmos — Athens Metro, Tram & Suburban Departures">
    <meta name="twitter:description" content="Free, offline-first companion for OASA Metro, Tram, and Hellenic Train Suburban.">
    <meta name="twitter:image" content="https://syrmos.peterdsp.dev/favicon.png">

    <!-- Structured data — helps Google show app + organization knowledge panel -->

          "alternateName": ["ΣΥΡΜΟΣ", "Syrmos Athens"],
          "url": "https://syrmos.peterdsp.dev/",
          "description": "Live Athens transit departures, station search, and map for Metro, Tram, and Suburban Railway.",
          "applicationCategory": "TravelApplication",
          "operatingSystem": "Any (web)",
          "browserRequirements": "Requires JavaScript and WebAssembly.",
          "isAccessibleForFree": true,
          "inLanguage": ["en", "el"],
          "offers": {"@type": "Offer", "price": "0", "priceCurrency": "EUR"},
          "author": {"@id": "https://syrmos.peterdsp.dev/#person"}
        },
        {
          "@type": "MobileApplication",
          "@id": "https://apps.apple.com/app/id6777650671#ios",
          "name": "Syrmos for iOS",
          "operatingSystem": "iOS 17",
          "applicationCategory": "TravelApplication",
          "downloadUrl": "https://apps.apple.com/app/id6777650671",
          "url": "https://apps.apple.com/app/id6777650671",
          "isAccessibleForFree": true,
          "offers": {"@type": "Offer", "price": "0", "priceCurrency": "EUR"},
          "author": {"@id": "https://syrmos.peterdsp.dev/#person"}
        },
        {
          "@type": "MobileApplication",
          "@id": "https://play.google.com/store/apps/details?id=com.syrmos.android#android",
          "name": "Syrmos for Android",
          "operatingSystem": "Android",
          "applicationCategory": "TravelApplication",
          "downloadUrl": "https://play.google.com/store/apps/details?id=com.syrmos.android",
          "url": "https://play.google.com/store/apps/details?id=com.syrmos.android",
          "isAccessibleForFree": true,
          "offers": {"@type": "Offer", "price": "0", "priceCurrency": "EUR"},
          "author": {"@id": "https://syrmos.peterdsp.dev/#person"}
        },
        {
          "@type": "Person",
          "@id": "https://syrmos.peterdsp.dev/#person",

          "sameAs": ["https://github.com/peterdsp"]
        },
        {
          "@type": "SoftwareSourceCode",
          "name": "Syrmos source code",

          "programmingLanguage": ["Kotlin", "Swift", "JavaScript"],

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link rel="stylesheet" href="web-map.css">
</head>
<body>
<div class="app-shell">
    <div id="map"></div>

    <header class="top-bar">
        <div class="brand-block">
            <div class="brand">Syrmos</div>
            <div class="subtitle">Athens rail map</div>
            <div class="store-badges">
                <a href="https://apps.apple.com/app/id6777650671"
                   target="_blank" rel="noopener"
                   aria-label="Download Syrmos on the App Store">
                    <img src="app-store.svg" alt="Download on the App Store" height="36" loading="lazy">
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.syrmos.android"
                   target="_blank" rel="noopener"
                   aria-label="Get Syrmos on Google Play">
                    <img src="google-play.svg" alt="Get it on Google Play" height="36" loading="lazy">
                </a>
            </div>
        </div>
        <section class="search-card">
            <div class="search-input-shell">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input id="stationSearch" class="search-input" type="search" placeholder="Search station, Syntagma, Piraeus, Airport" aria-label="Search station">
            </div>
            <div id="searchResults" class="search-results"></div>
        </section>
        <div class="map-controls">
            <div class="zoom-controls" aria-label="Map zoom controls">
                <button id="zoomOutButton" class="control-button" type="button" aria-label="Zoom out">−</button>
                <button id="zoomInButton" class="control-button" type="button" aria-label="Zoom in">+</button>
            </div>
            <button id="themeToggle" class="control-button" type="button" aria-label="Toggle dark mode">☾</button>
            <button id="vehiclesToggle" class="control-button" type="button" aria-label="Hide vehicles" title="Hide vehicles">🚇</button>
            <button id="locateButton" class="ghost-button" type="button">Locate me</button>
        </div>
    </header>

    <aside class="insight-panel" id="insightPanel">
        <div class="panel-peek" id="panelPeek">
            <span class="panel-peek__icon">●</span>
            <span id="panelPeekText" class="panel-peek__text">Live trains</span>
            <span class="panel-peek__chevron">▲</span>
        </div>

        <div class="panel-cards-wrap">
            <div class="panel-card">
                <div class="panel-card__title">Live trains</div>
                <div id="liveTrainList" class="panel-list"></div>
            </div>

            <div class="panel-card">
                <div class="panel-card__title">Nearby stations</div>
                <div id="nearbyStationList" class="panel-list"></div>
            </div>

            <div class="panel-card">
                <div class="panel-card__title">Popular stations</div>
                <div id="popularStationList" class="panel-list"></div>
            </div>

            <div class="panel-card">
                <div class="panel-card__title">OASA tickets</div>
                <div id="faresList" class="panel-list"></div>
                <a id="faresLink" class="panel-link" href="https://www.oasa.gr/en/tickets/prices-of-products/" target="_blank" rel="noopener">View on OASA ↗</a>
            </div>

            <div class="panel-card">
                <div class="panel-card__title">Useful information</div>
                <div id="infoLinksList" class="info-links-list"></div>
            </div>
        </div>
    </aside>

    <section id="stationSheet" class="station-sheet station-sheet--hidden" aria-live="polite">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <div>
                <h2 id="stationName">Select a station</h2>
                <p id="stationNameEl" class="station-alt"></p>
            </div>
            <button id="sheetClose" class="ghost-button" type="button">Done</button>
        </div>

        <div class="sheet-content">
            <div class="sheet-block">
                <div class="sheet-label">Lines at this station</div>
                <div id="lineBadges" class="badge-row"></div>
            </div>

            <div id="stationMetaBlock" class="sheet-block">
                <div id="stationMeta" class="meta-list"></div>
            </div>

            <div class="sheet-block">
                <div class="sheet-label">Next departures</div>
                <div id="stationDepartures" class="departure-list"></div>
            </div>
        </div>

        <a id="directionsLink" class="primary-button sheet-footer-action" href="#" target="_blank" rel="noreferrer">
            Get directions
        </a>
    </section>
</div>

<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
></script>
<script src="web-map.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syrmos — Live Athens Rail Times</title>
    <meta name="description" content="Live departure times for Athens Metro, Tram, and Suburban Railway">
    <meta name="theme-color" content="#0072CE">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #ComposeTarget {
            width: 100%;
            height: 100%;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #44474e;
        }
        .loading h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1c1e;
            margin-bottom: 4px;
        }
        .loading p {
            font-size: 14px;
            color: #74777f;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e2e6;
            border-top-color: #0072CE;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-top: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loading" id="loadingIndicator">
    <h1>Syrmos</h1>
    <p>Live Athens rail times</p>
    <div class="spinner"></div>
</div>
<canvas id="ComposeTarget"></canvas>
<script>
    // Hide loading indicator once WASM canvas renders
    const observer = new MutationObserver(() => {
        const canvas = document.getElementById('ComposeTarget');
        if (canvas && canvas.width > 0) {
            document.getElementById('loadingIndicator').style.display = 'none';
            observer.disconnect();
        }
    });
    observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    // Fallback: hide after 10s regardless
    setTimeout(() => {
        const el = document.getElementById('loadingIndicator');
        if (el) el.style.display = 'none';
    }, 10000);
</script>
<script src="composeApp.js"></script>
</body>
</html>
